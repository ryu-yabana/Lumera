<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lumera — texture study</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

<style>
:root {
  --bg: #F9F7F2;
  --text: #4A4A4A;
  --accent: #8C9A8E;
  --border: #E6E2D8;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 20px;
  margin: 0;
  /* Prevents horizontal "wobble" on touch devices */
  touch-action: pan-y;
  overflow-x: hidden;
}

h1 {
  font-weight: 200;
  letter-spacing: 0.5em;
  font-size: 1.5rem;
  margin-bottom: 10px;
}

.signature {
  font-size: 0.65rem;
  letter-spacing: 0.3em;
  opacity: 0.5;
  margin-bottom: 40px;
}

.signature a {
  color: inherit;
  text-decoration: none;
  transition: opacity 0.3s ease;
  display: inline-flex;
  align-items: center;
}

.signature a:hover {
  opacity: 1;
  text-decoration: none; /* Removed underline to keep it minimal */
}

.external-arrow {
  font-size: 0.6rem;
  margin-left: 4px;
  opacity: 0.7;
}

.drop-zone {
  border: 1px dashed var(--accent);
  padding: 40px;
  text-align: center;
  cursor: pointer;
  width: 100%;
  max-width: 500px;
  margin-bottom: 40px;
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  transition: background 0.3s ease;
  box-sizing: border-box;
}

.drop-zone:hover {
  background: #f1efea;
}

.sliders {
  width: 100%;
  max-width: 500px;
}

.slider-group {
  margin-bottom: 25px;
}

label {
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
}

span {
  opacity: 0.5;
  font-style: italic;
}

input[type=range] {
  width: 100%;
  appearance: none;
  background: transparent;
  /* Larger touch area for fingers */
  padding: 10px 0; 
}

input[type=range]::-webkit-slider-runnable-track {
  height: 2px;
  background: var(--border);
}

input[type=range]::-webkit-slider-thumb {
  appearance: none;
  height: 20px; /* Slightly larger for easier mobile grabbing */
  width: 20px;
  border-radius: 50%;
  background: var(--accent);
  margin-top: -9px;
  cursor: pointer;
}

.controls {
  margin-top: 30px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
}

button {
  border: 1px solid var(--text);
  background: none;
  padding: 10px 20px;
  cursor: pointer;
  letter-spacing: 0.2em;
  font-size: 0.7rem;
  transition: all 0.3s ease;
}

button:hover {
  background: var(--text);
  color: var(--bg);
}

button:disabled {
  opacity: 0.4;
  cursor: default;
}

.status {
  margin-top: 30px;
  font-size: 0.7rem;
  opacity: 0.6;
}

#file-input {
  display: none;
}

/* MOBILE OPTIMIZATIONS */
@media (max-width: 600px) {
  body {
    padding: 40px 15px;
  }
  h1 {
    font-size: 1.2rem;
  }
  .drop-zone {
    padding: 25px;
    font-size: 0.7rem;
  }
  button {
    flex: 1 1 40%; /* Buttons take up half width on small screens */
    padding: 12px 10px;
  }
}
</style>
</head>

<body>

<h1>LUMERA</h1>
<div class="signature">texture study</div>
<div class="signature">by <a href="https://ryu-yabana.github.io/" target="_blank">Ryu Yabana<span class="external-arrow">↗</span></a></div>

<input type="file" id="file-input" accept="audio/*">
<div class="drop-zone" id="drop-zone">LOAD SOURCE SOUND</div>

<div class="sliders">

  <div class="slider-group">
    <label>Fog <span>Atmosphere</span></label>
    <input type="range" id="fog" min="0" max="1" step="0.01" value="0.5">
  </div>

  <div class="slider-group">
    <label>Weight <span>Pitch & Tone</span></label>
    <input type="range" id="weight" min="-24" max="24" step="1" value="0">
  </div>

  <div class="slider-group">
    <label>Distance <span>Softness</span></label>
    <input type="range" id="distance" min="200" max="5000" value="1500">
  </div>

  <div class="slider-group">
    <label>Air <span>Hi-pass</span></label>
    <input type="range" id="air" min="20" max="1000" value="100">
  </div>

  <div class="slider-group">
    <label>Drift <span>Movement</span></label>
    <input type="range" id="drift" min="0" max="1" step="0.01" value="0.2">
  </div>

  <div class="slider-group">
