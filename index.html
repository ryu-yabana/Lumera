<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lumera — texture study</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

<style>
:root {
  --bg: #F9F7F2;
  --text: #4A4A4A;
  --accent: #8C9A8E;
  --border: #E6E2D8;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 20px;
  margin: 0;
}

h1 {
  font-weight: 200;
  letter-spacing: 0.5em;
  font-size: 1.5rem;
  margin-bottom: 10px;
}

.signature {
  font-size: 0.65rem;
  letter-spacing: 0.3em;
  opacity: 0.5;
  margin-bottom: 40px;
}

/* Link styling to match your aesthetic */
.signature a {
  color: inherit;
  text-decoration: none;
  transition: opacity 0.3s ease;
}

.signature a:hover {
  opacity: 1;
  text-decoration: underline;
}

.drop-zone {
  border: 1px dashed var(--accent);
  padding: 40px;
  text-align: center;
  cursor: pointer;
  width: 100%;
  max-width: 500px;
  margin-bottom: 40px;
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  transition: background 0.3s ease;
}

.drop-zone:hover {
  background: #f1efea;
}

.sliders {
  width: 100%;
  max-width: 500px;
}

.slider-group {
  margin-bottom: 25px;
}

label {
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
}

span {
  opacity: 0.5;
  font-style: italic;
}

input[type=range] {
  width: 100%;
  appearance: none;
  background: transparent;
}

input[type=range]::-webkit-slider-runnable-track {
  height: 2px;
  background: var(--border);
}

input[type=range]::-webkit-slider-thumb {
  appearance: none;
  height: 16px;
  width: 16px;
  border-radius: 50%;
  background: var(--accent);
  margin-top: -7px;
  cursor: pointer;
}

.controls {
  margin-top: 30px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
}

button {
  border: 1px solid var(--text);
  background: none;
  padding: 10px 20px;
  cursor: pointer;
  letter-spacing: 0.2em;
  font-size: 0.7rem;
  transition: all 0.3s ease;
}

button:hover {
  background: var(--text);
  color: var(--bg);
}

button:disabled {
  opacity: 0.4;
  cursor: default;
}

.status {
  margin-top: 30px;
  font-size: 0.7rem;
  opacity: 0.6;
}

#file-input {
  display: none;
}
</style>
</head>

<body>

<h1>LUMERA</h1>
<div class="signature">texture study</div>
<div class="signature">by <a href="https://ryu-yabana.github.io/" target="_blank">Ryu Yabana</a></div>

<input type="file" id="file-input" accept="audio/*">
<div class="drop-zone" id="drop-zone">LOAD SOURCE SOUND</div>

<div class="sliders">

  <div class="slider-group">
    <label>Fog <span>Atmosphere</span></label>
    <input type="range" id="fog" min="0" max="1" step="0.01" value="0.5">
  </div>

  <div class="slider-group">
    <label>Weight <span>Pitch & Tone</span></label>
    <input type="range" id="weight" min="-24" max="24" step="1" value="0">
  </div>

  <div class="slider-group">
    <label>Distance <span>Softness</span></label>
    <input type="range" id="distance" min="200" max="5000" value="1500">
  </div>

  <div class="slider-group">
    <label>Air <span>Hi-pass</span></label>
    <input type="range" id="air" min="20" max="1000" value="100">
  </div>

  <div class="slider-group">
    <label>Drift <span>Movement</span></label>
    <input type="range" id="drift" min="0" max="1" step="0.01" value="0.2">
  </div>

  <div class="slider-group">
    <label>Bloom <span>Harmony</span></label>
    <input type="range" id="bloom" min="0" max="1" step="0.01" value="0">
  </div>

</div>

<div class="controls">
  <button id="play-btn">Listen</button>
  <button id="restart-btn">Again</button>
  <button id="serendipity-btn">Serendipity</button>
  <button id="capture-btn">Capture</button>
</div>

<div id="status" class="status">Waiting for audio...</div>

<script>
let player;
let harmony1, harmony2;
let driftLFO;

// AUDIO CHAIN
const limiter = new Tone.Limiter(-1).toDestination();
const widener = new Tone.StereoWidener(0.7).connect(limiter);
const highpass = new Tone.Filter(100, "highpass").connect(widener);
const lowpass = new Tone.Filter(1500, "lowpass").connect(highpass);
const reverb = new Tone.Reverb({ decay: 8, wet: 0.5 }).connect(lowpass);

// UI ELEMENTS
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const playBtn = document.getElementById('play-btn');
const restartBtn = document.getElementById('restart-btn');
const captureBtn = document.getElementById('capture-btn');
const serendipityBtn = document.getElementById('serendipity-btn');
const statusText = document.getElementById('status');

// LFO for organic movement (Drift)
driftLFO = new Tone.LFO({
  frequency: 0.1,
  min: -10,
  max: 10
}).start();

// LOAD FILE
dropZone.onclick = () => fileInput.click();

fileInput.onchange = e => {
  if (e.target.files.length > 0) handleFile(e.target.files[0]);
};

async function handleFile(file) {
  statusText.innerText = "Deciphering sound...";

  const reader = new FileReader();
  reader.onload = async function(e) {
    const buffer = await Tone.context.decodeAudioData(e.target.result);

    if (player) player.dispose();

    player = new Tone.GrainPlayer({
      url: buffer,
      loop: true,
      grainSize: 0.2,
      overlap: 0.2
    });

    harmony1 = new Tone.PitchShift({ pitch: 7, wet: 0 });
    harmony2 = new Tone.PitchShift({ pitch: 12, wet: 0 });

    player.connect(reverb);
    player.connect(harmony1);
    player.connect(harmony2);
    harmony1.connect(reverb);
    harmony2.connect(reverb);
    
    driftLFO.connect(player.detune);

    statusText.innerText = "Ready: " + file.name;
    await Tone.start();
    player.start();
    playBtn.innerText = "Hold";
  };
  reader.readAsArrayBuffer(file);
}

// PLAY / STOP
playBtn.onclick = async () => {
  if (!player) return;
  if (player.state === "started") {
    player.stop();
    playBtn.innerText = "Listen";
  } else {
    await Tone.start();
    player.start();
    playBtn.innerText = "Hold";
  }
};

// RESTART
restartBtn.onclick = () => {
  if (!player) return;
  player.stop();
  setTimeout(() => player.start(), 100);
};

// SERENDIPITY
serendipityBtn.onclick = () => {
  const sliders = ['fog', 'weight', 'distance', 'air', 'drift', 'bloom'];
  sliders.forEach(id => {
    const el = document.getElementById(id);
    const randomVal = (Math.random() * (parseFloat(el.max) - parseFloat(el.min)) + parseFloat(el.min)).toFixed(2);
    el.value = randomVal;
    el.dispatchEvent(new Event('input'));
  });
};

// SLIDERS
document.getElementById('fog').oninput = e => reverb.wet.value = e.target.value;

document.getElementById('weight').oninput = e => { 
  if(!player) return;
  const val = parseFloat(e.target.value);
  player.detune = val * 100;
  player.volume.value = val < 0 ? val * 0.5 : 0;
};

document.getElementById('distance').oninput = e => lowpass.frequency.value = e.target.value;
document.getElementById('air').oninput = e => highpass.frequency.value = e.target.value;

document.getElementById('drift').oninput = e => {
  if (!player) return;
  const d = parseFloat(e.target.value);
  player.grainSize = 0.05 + d * 0.5;
  player.playbackRate = 1 - (d * 0.2);
  driftLFO.frequency.value = d * 0.5;
  driftLFO.amplitude.value = d; 
};

document.getElementById('bloom').oninput = e => {
  if (!harmony1) return;
  const val = parseFloat(e.target.value);
  harmony1.wet.value = val;
  harmony2.wet.value = val * 0.6;
  widener.width.value = 0.5 + (val * 0.5);
};

// CAPTURE
captureBtn.onclick = () => {
  if (!player) return alert("Load sound first");

  const dest = Tone.context.createMediaStreamDestination();
  Tone.Destination.connect(dest);
  const recorder = new MediaRecorder(dest.stream);
  let chunks = [];

  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.onstop = () => {
    statusText.innerText = "Finalizing texture...";
    const blob = new Blob(chunks, { type: 'audio/wav' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;

    // GENERATE FILENAME: Lumera_Texture_YYYYMMDDHHMM
    const now = new Date();
    const timestamp = now.getFullYear() +
      String(now.getMonth() + 1).padStart(2, '0') +
      String(now.getDate()).padStart(2, '0') +
      String(now.getHours()).padStart(2, '0') +
      String(now.getMinutes()).padStart(2, '0');
    
    a.download = `Lumera_Texture_${timestamp}.wav`;
    
    a.click();

    captureBtn.innerText = "Capture";
    captureBtn.disabled = false;
    statusText.innerText = "Ready";
    Tone.Destination.volume.value = 0;
  };

  recorder.start();
  captureBtn.disabled = true;
  
  let time = 60;
  const interval = setInterval(() => {
    time--;
    captureBtn.innerText = `Recording (${time}s)`;
    if (time <= 3) Tone.Destination.volume.rampTo(-Infinity, 3);
    if (time <= 0) {
      clearInterval(interval);
      recorder.stop();
    }
  }, 1000);
};
</script>

</body>
</html>
